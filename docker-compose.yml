services:
  wock:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      Database__Provider: Sqlite
      Database__ConnectionString: Data Source=/data/wock.db
      Plugins__StoragePath: /plugins
    volumes:
      - wock-data:/data
      - wock-plugins:/plugins
    restart: unless-stopped

volumes:
  wock-data:
  wock-plugins:
